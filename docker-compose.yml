services:
  snmpc-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: snmpc-dashboard:latest
    container_name: snmpc-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      TZ: America/Sao_Paulo
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      STREAMLIT_SERVER_ENABLE_CORS: "true"
      STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION: "true"
      SNMPC_FILE: ${SNMPC_FILE:-imports/SNMPc.txt}
      SNMPC_IMPORTS_DIR: /app/imports
      SNMPC_CONFIG_DIR: /app/config
      SNMPC_CACHE_DIR: /app/cache
      SNMPC_BACKUP_DIR: /app/backups
      SNMPC_LOGIN_ATTEMPTS_FILE: /app/config/login_attempts.json
      SNMPC_MAP_CACHE_FILE: /app/cache/mapa_clientes.json
      SNMPC_CONTRACTS_DIR: /app/contracts
      SNMPC_CONTRACTS_INDEX_FILE: /app/config/site_contracts.json
      SNMPC_EQUIPMENT_CATALOG_FILE: /app/config/equipment_catalog.json
      SNMPC_PRODUCT_CATALOG_FILE: /app/config/product_catalog.json
      SNMPC_BACKUP_CONFIG_FILE: /app/config/backup_config.json
      SNMPC_MAP_CONFIG_FILE: /app/config/map_config.json
      MAP_SATELLITE_PROVIDER: ${MAP_SATELLITE_PROVIDER:-maptiler}
      MAP_GEOCODING_PROVIDER: ${MAP_GEOCODING_PROVIDER:-maptiler}
      MAPTILER_API_KEY: ${MAPTILER_API_KEY:-}
      MAPTILER_TOKEN: ${MAPTILER_TOKEN:-}
      MAPTILER_SATELLITE_STYLE_ID: ${MAPTILER_SATELLITE_STYLE_ID:-hybrid}
      MAPBOX_API_KEY: ${MAPBOX_API_KEY:-}
      DATABASE_URL: sqlite:////app/rede.db
    volumes:
      - ./imports:/app/imports
      - ./config:/app/config
      - ./contracts:/app/contracts
      - ./cache:/app/cache
      - ./backups:/app/backups
      - ./rede.db:/app/rede.db
